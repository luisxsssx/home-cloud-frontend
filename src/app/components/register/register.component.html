<div class="min-h-screen flex items-center justify-center bg-gray-50 p-3">
  <div class="bg-white p-5 md:p-6 rounded-md shadow-sm border border-gray-100 w-full max-w-sm">
    <div class="text-center mb-5">
      <div class="w-10 h-10 bg-green-800 rounded-lg flex items-center justify-center mx-auto mb-3 shadow-sm">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />
        </svg>
      </div>
      <h2 class="text-base font-medium text-gray-700">Create account</h2>
    </div>
    
    @if (error()) {
      <div class="bg-red-50 border border-red-100 text-red-600 px-3 py-2 rounded-md mb-4 text-xs">
        {{ error() }}
      </div>
    }
    
    <form (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="username" class="block text-xs font-medium text-gray-500 mb-1">
          Username
        </label>
        <input
          type="text"
          id="username"
          [(ngModel)]="userData.username"
          name="username"
          required
          class="w-full px-3 py-1.5 text-sm border border-gray-200 rounded-md focus:outline-none focus:ring-1 focus:ring-green-600 focus:border-green-600"
          placeholder="username"
        />
      </div>
      
      <div class="mb-3">
        <label for="email" class="block text-xs font-medium text-gray-500 mb-1">
          Email
        </label>
        <input
          type="email"
          id="email"
          [(ngModel)]="userData.email"
          name="email"
          required
          class="w-full px-3 py-1.5 text-sm border border-gray-200 rounded-md focus:outline-none focus:ring-1 focus:ring-green-600 focus:border-green-600"
          placeholder="email@example.com"
        />
      </div>
      
      <div class="mb-4">
        <label for="password" class="block text-xs font-medium text-gray-500 mb-1">
          Password
        </label>
        <div class="relative">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            id="password"
            [(ngModel)]="userData.password"
            name="password"
            required
            minlength="6"
            class="w-full px-3 py-1.5 pr-9 text-sm border border-gray-200 rounded-md focus:outline-none focus:ring-1 focus:ring-green-600 focus:border-green-600"
            placeholder="••••••••"
          />
          <button
            type="button"
            (click)="togglePassword()"
            class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
          >
            @if (showPassword()) {
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
              </svg>
            } @else {
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            }
          </button>
        </div>
      </div>
      
      <button
        type="submit"
        [disabled]="loading()"
        class="w-full bg-green-700 text-white py-1.5 px-4 rounded-md hover:bg-green-800 focus:outline-none focus:ring-1 focus:ring-green-600 disabled:opacity-50 text-sm font-medium"
      >
        @if (loading()) {
          <span>Creating account...</span>
        } @else {
          <span>Create account</span>
        }
      </button>
    </form>
    
    <p class="mt-4 text-center text-xs text-gray-400">
      Already have an account?
      <a routerLink="/login" class="text-green-700 hover:text-green-800">Sign in</a>
    </p>
  </div>
</div>
