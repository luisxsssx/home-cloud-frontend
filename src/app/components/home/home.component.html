<div class="min-h-screen flex bg-gray-50">
  @if (sidebarOpen()) {
    <div 
      class="fixed inset-0 bg-black/40 z-40 md:hidden backdrop-blur-sm"
      (click)="closeSidebar()"
    ></div>
  }

  <input 
    #fileInput 
    type="file" 
    class="hidden" 
    (change)="onFileSelected($event)"
  />

  <div 
    class="fixed inset-y-0 left-0 z-50 w-56 transform transition-transform duration-200 ease-out md:hidden"
    [class.translate-x-0]="sidebarOpen()"
    [class.-translate-x-full]="!sidebarOpen()"
  >
    <app-sidebar (closeSidebar)="closeSidebar()" (addMenuOpen)="triggerFileInput()"></app-sidebar>
  </div>

  <app-sidebar class="hidden md:flex" (addMenuOpen)="triggerFileInput()"></app-sidebar>
  
  <main class="flex-1 flex flex-col min-w-0">
    <header class="bg-white border-b border-gray-100 px-3 py-2.5 md:px-5 md:py-3">
      <div class="flex items-center justify-between gap-3">
        <button 
          (click)="toggleSidebar()"
          class="md:hidden p-1.5 text-gray-500 hover:bg-gray-100 rounded-md"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        
        <div class="flex-1 max-w-xl">
          <div class="relative">
            <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input 
              type="text" 
              placeholder="Search"
              class="w-full pl-9 pr-3 py-1.5 text-sm bg-gray-50 border-transparent rounded-md focus:bg-white focus:border-green-600 focus:ring-1 focus:ring-green-200 focus:outline-none transition-all"
            />
          </div>
        </div>
      </div>
    </header>

    <div class="flex-1 p-3 md:p-5 overflow-auto">
      <div class="mb-6">
        <h1 class="text-xl md:text-2xl font-medium text-gray-700">Welcome, {{ user?.username }}</h1>
        <p class="text-gray-400 mt-1 text-sm">Access your files anytime, anywhere</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="bg-white rounded-md shadow-sm border border-gray-100 p-4">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center">
              <svg class="w-5 h-5 text-green-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
              </svg>
            </div>
            <div>
              <p class="text-xs text-gray-400">Total Files</p>
              <p class="text-lg font-medium text-gray-700">-</p>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-md shadow-sm border border-gray-100 p-4">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center">
              <svg class="w-5 h-5 text-yellow-600" fill="currentColor" viewBox="0 0 24 24">
                <path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
              </svg>
            </div>
            <div>
              <p class="text-xs text-gray-400">Folders</p>
              <p class="text-lg font-medium text-gray-700">-</p>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-md shadow-sm border border-gray-100 p-4">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
              <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </div>
            <div>
              <p class="text-xs text-gray-400">Recent Activity</p>
              <p class="text-lg font-medium text-gray-700">-</p>
            </div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-md shadow-sm border border-gray-100 p-5">
        <h2 class="text-base font-medium text-gray-700 mb-3">Quick Actions</h2>
        <div class="flex flex-wrap gap-3">
          <div class="flex items-center gap-2 px-3 py-2 bg-gray-50 rounded-md">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            <span class="text-sm text-gray-600">Upload files from My Drive</span>
          </div>
          <div class="flex items-center gap-2 px-3 py-2 bg-gray-50 rounded-md">
            <svg class="w-4 h-4 text-gray-400" fill="currentColor" viewBox="0 0 24 24">
              <path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
            </svg>
            <span class="text-sm text-gray-600">Create folder from My Drive</span>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
