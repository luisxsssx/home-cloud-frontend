<div class="min-h-screen flex bg-gray-50">
  <!-- Mobile sidebar backdrop -->
  @if (sidebarOpen()) {
    <div 
      class="fixed inset-0 bg-black/40 z-40 md:hidden backdrop-blur-sm"
      (click)="closeSidebar()"
    ></div>
  }

  <!-- Mobile sidebar -->
  <div 
    class="fixed inset-y-0 left-0 z-50 w-56 transform transition-transform duration-200 ease-out md:hidden"
    [class.translate-x-0]="sidebarOpen()"
    [class.-translate-x-full]="!sidebarOpen()"
  >
    <app-sidebar (closeSidebar)="closeSidebar()"></app-sidebar>
  </div>

  <!-- Desktop sidebar -->
  <app-sidebar class="hidden md:flex"></app-sidebar>
  
  <main class="flex-1 flex flex-col min-w-0">
    <!-- Mobile header with hamburger -->
    <header class="bg-white border-b border-gray-100 px-3 py-2.5 md:px-5 md:py-3">
      <div class="flex items-center justify-between gap-3">
        <!-- Mobile menu button -->
        <button 
          (click)="toggleSidebar()"
          class="md:hidden p-1.5 text-gray-500 hover:bg-gray-100 rounded-md"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        
        <div class="flex-1 max-w-xl">
          <div class="relative">
            <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input 
              type="text" 
              placeholder="Search"
              class="w-full pl-9 pr-3 py-1.5 text-sm bg-gray-50 border-transparent rounded-md focus:bg-white focus:border-green-600 focus:ring-1 focus:ring-green-200 focus:outline-none transition-all"
            />
          </div>
        </div>
        
        <div class="flex items-center gap-1.5">
          <button class="p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-md">
            <svg class="w-4 h-4 md:w-4.5 md:h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <div class="flex-1 p-3 md:p-5 overflow-auto">
      <div class="mb-3 md:mb-5">
        <h1 class="text-lg md:text-xl font-medium text-gray-700">My Files</h1>
        <p class="text-gray-400 mt-0.5 text-xs md:text-sm">Welcome back, {{ user?.username }}</p>
      </div>

      <div class="bg-white rounded-md shadow-sm border border-gray-100 p-5 md:p-6 text-center">
        <div class="w-12 h-12 md:w-14 md:h-14 mx-auto mb-3 bg-green-50 rounded-full flex items-center justify-center">
          <svg class="w-6 h-6 md:w-7 md:h-7 text-green-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
          </svg>
        </div>
        <h3 class="text-sm md:text-base font-medium text-gray-600 mb-1.5">
          @if (files().length === 0) {
            No files yet
          } @else {
            {{ files().length }} file(s)
          }
        </h3>
        <p class="text-gray-400 mb-3 text-xs md:text-sm">
          @if (files().length === 0) {
            Upload your first file to get started
          } @else {
            Drag and drop or click to upload more
          }
        </p>
        <input 
          #fileInput
          type="file" 
          class="hidden" 
          (change)="onFileSelected($event)"
        />
        <button 
          (click)="triggerFileInput()"
          [disabled]="uploading()"
          class="px-3.5 py-1.5 bg-green-700 text-white text-xs rounded-md hover:bg-green-800 transition-colors font-medium disabled:opacity-50 disabled:cursor-not-allowed"
        >
          @if (uploading()) {
            Uploading...
          } @else {
            Upload
          }
        </button>
      </div>
    </div>
  </main>
</div>
